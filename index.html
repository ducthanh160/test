<body>
    <h1>Hello Github</h1>

<script>
    function Random(){
        return Math.floor(Math.random()*255);
    }
    function RanColor(){
        const r = Random();
        const g = Random();
        const b = Random();
        return `rgb(${r}, ${g}, ${b})`;
    }
    const randomColor = RanColor();
    console.log(randomColor);
</script>
